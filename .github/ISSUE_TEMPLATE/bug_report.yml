name: Bug Report
about: Something isn't working
title: "[BUG] "
labels: ["bug"]
assignees: ""
body:
  - type: markdown
    attributes:
      value: "Thanks for the bug report! Please fill out what you can."
  - type: textarea
    id: what-happened
    attributes:
      label: What Happened
      description: Clear description of the bug.
      placeholder: "gitctx auto applies wrong profile when remote URL matches multiple rules..."
    validations:
      required: true
  - type: textarea
    id: steps
    attributes:
      label: Steps to Reproduce
      description: Minimal steps to trigger it.
      placeholder: |
        1. gitctx add work -n "Work" -e "work@company.com"
        2. gitctx add personal -n "Personal" -e "personal@gmail.com"
        3. gitctx rule add -p work -r "github.com"
        4. gitctx rule add -p personal -r "github.com/me"
        5. cd my-repo && gitctx auto
        6. Observe wrong profile applied
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected Behavior
      placeholder: "Should apply 'personal' profile (more specific rule)"
    validations:
      required: true
  - type: textarea
    id: actual
    attributes:
      label: Actual Behavior
      description: Error output, wrong profile shown, etc.
      placeholder: "gitctx current shows 'work' profile"
    validations:
      required: true
  - type: input
    id: version
    attributes:
      label: gitctx Version
      description: Run `gitctx --version`
      placeholder: "0.1.0"
    validations:
      required: true
  - type: input
    id: python-version
    attributes:
      label: Python Version
      placeholder: "3.11.5"
    validations:
      required: true
  - type: dropdown
    id: install-method
    attributes:
      label: Install Method
      options:
        - pip install gitctx
        - pip install -e . (editable)
        - Other
    validations:
      required: true
  - type: textarea
    id: context
    attributes:
      label: Additional Context
      description: Config files (~/.gitctx/profiles.toml, rules.toml), git remote -v output, etc.
  - type: checkboxes
    id: checklist
    attributes:
      label: Pre-submission Checklist
      options:
        - label: I searched existing issues (open + closed)
          required: true
        - label: I'm on the latest release
          required: true
        - label: This isn't a usage question (use Discussions instead)
          required: true