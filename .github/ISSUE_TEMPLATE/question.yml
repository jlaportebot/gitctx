name: Question / Help
about: Ask a question about using gitctx
title: "[QUESTION] "
labels: ["question"]
assignees: ""
body:
  - type: markdown
    attributes:
      value: "Got a question? Ask away."
  - type: textarea
    id: question
    attributes:
      label: Your Question
      description: What do you need help with?
      placeholder: "How do I make gitctx auto-switch when I cd into a repo? The shell hook example in README doesn't work for me..."
    validations:
      required: true
  - type: dropdown
    id: category
    attributes:
      label: Category
      options:
        - CLI usage
        - Profile setup
        - Rule configuration
        - Auto-detection
        - Shell hook / prompt integration
        - Installation
        - Contributing / development
        - Other
    validations:
      required: true
  - type: textarea
    id: tried
    attributes:
      label: What Have You Tried?
      description: Docs, search, experiments — helps us give a better answer.
      placeholder: "Read README shell hook section, added to .bashrc, but profile doesn't switch on cd..."
  - type: checkboxes
    id: checklist
    attributes:
      label: Pre-check
      options:
        - label: I checked the README
          required: false
        - label: I searched existing issues/discussions
          required: false
        - label: This isn't a bug report (use Bug Report template instead)
          required: true